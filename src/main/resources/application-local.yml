spring:
  datasource:
    url: jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:${MYSQL_PORT:3306}}/${DB_DATABASE:${MYSQL_DATABASE:mydatabase}}?serverTimezone=Asia/Seoul&characterEncoding=UTF-8
    driver-class-name: com.mysql.cj.jdbc.Driver
    username: ${DB_USER:myuser}
    password: ${DB_PASSWORD:mypassword}
  flyway:
    enabled: true

