openapi: 3.0.3
info:
  title: java-springboot-jooq-sample API
  version: 1.0.0
  description: |
    Spring Boot + jOOQ sample API specification with Flyway and MySQL.
    This document reflects the current controller-based HTTP contract in this repository.
servers:
  - url: http://localhost:18080
    description: Local server
tags:
  - name: Auth
    description: Authentication and JWT login APIs
  - name: Users
    description: User CRUD and lookup APIs
  - name: Orders
    description: Order query, batch item, and status transition APIs

paths:
  /api/auth/login:
    post:
      tags: [Auth]
      operationId: login
      summary: username/password 로그인
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
            examples:
              login:
                $ref: '#/components/examples/LoginRequestExample'
      responses:
        '200':
          description: 로그인 성공
          headers:
            Authorization:
              schema:
                type: string
              description: Bearer access token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoginResponse'
              examples:
                success:
                  $ref: '#/components/examples/LoginResponseExample'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /api/users:
    get:
      tags: [Users]
      operationId: getUsers
      summary: 계정 목록 조회
      responses:
        '200':
          description: 계정 목록
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/UserResponse'
              examples:
                success:
                  $ref: '#/components/examples/UserListResponseExample'
    post:
      tags: [Users]
      operationId: createUser
      summary: 계정 생성
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateUserRequest'
            examples:
              create-user:
                $ref: '#/components/examples/CreateUserRequestExample'
      responses:
        '201':
          description: 생성된 계정
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserResponse'
              examples:
                created:
                  $ref: '#/components/examples/CreatedUserResponseExample'
        '400':
          $ref: '#/components/responses/BadRequest'
        '409':
          $ref: '#/components/responses/Conflict'
    put:
      tags: [Users]
      operationId: updateUser
      summary: 계정 수정
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateUserRequest'
            examples:
              update-user:
                $ref: '#/components/examples/UpdateUserRequestExample'
      responses:
        '200':
          description: 수정 결과
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UpdateUserResponse'
              examples:
                updated:
                  $ref: '#/components/examples/UpdateUserResponseExample'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'

  /api/users/{id}:
    get:
      tags: [Users]
      operationId: getUser
      summary: 계정 단건 조회
      parameters:
        - $ref: '#/components/parameters/UserId'
      responses:
        '200':
          description: 계정 상세
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserResponse'
              examples:
                found:
                  $ref: '#/components/examples/UserResponseExample'
        '404':
          $ref: '#/components/responses/NotFound'
    delete:
      tags: [Users]
      operationId: deleteUser
      summary: 계정 삭제
      parameters:
        - $ref: '#/components/parameters/UserId'
      responses:
        '200':
          description: 삭제 결과
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DeleteUserResponse'
              examples:
                deleted:
                  $ref: '#/components/examples/DeleteUserResponseExample'
        '404':
          $ref: '#/components/responses/NotFound'

  /api/users/detail:
    get:
      tags: [Users]
      operationId: getUserByUsername
      summary: username으로 계정 조회
      parameters:
        - in: query
          name: username
          required: true
          description: 조회할 사용자 ID(username)
          schema:
            type: string
            example: user123
      responses:
        '200':
          description: 계정 상세
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserResponse'
              examples:
                found-by-username:
                  $ref: '#/components/examples/UserResponseExample'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'

  /api/orders:
    get:
      tags: [Orders]
      operationId: getOrders
      summary: 주문 목록 조회
      parameters:
        - $ref: '#/components/parameters/CustomerName'
        - $ref: '#/components/parameters/OrderStatusQuery'
        - $ref: '#/components/parameters/MinTotalAmount'
        - $ref: '#/components/parameters/OrderedFrom'
        - $ref: '#/components/parameters/OrderedTo'
      responses:
        '200':
          description: 주문 목록
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/OrderResponse'
              examples:
                success:
                  $ref: '#/components/examples/OrderListResponseExample'
        '400':
          $ref: '#/components/responses/BadRequest'

  /api/orders/nested-select:
    get:
      tags: [Orders]
      operationId: getOrdersWithNestedSelect
      summary: nested select 기반 주문 목록 조회
      parameters:
        - $ref: '#/components/parameters/CustomerName'
        - $ref: '#/components/parameters/OrderStatusQuery'
        - $ref: '#/components/parameters/MinTotalAmount'
        - $ref: '#/components/parameters/OrderedFrom'
        - $ref: '#/components/parameters/OrderedTo'
      responses:
        '200':
          description: 주문 목록
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/OrderResponse'
              examples:
                nested-select:
                  $ref: '#/components/examples/NestedOrderListResponseExample'

  /api/orders/{id}:
    get:
      tags: [Orders]
      operationId: getOrder
      summary: 주문 단건 조회
      parameters:
        - $ref: '#/components/parameters/OrderId'
      responses:
        '200':
          description: 주문 상세
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OrderResponse'
              examples:
                created-order:
                  $ref: '#/components/examples/OrderDetailResponseExample'
        '404':
          $ref: '#/components/responses/NotFound'

  /api/orders/{id}/nested-select:
    get:
      tags: [Orders]
      operationId: getOrderWithNestedSelect
      summary: nested select 기반 주문 단건 조회
      parameters:
        - $ref: '#/components/parameters/OrderId'
      responses:
        '200':
          description: 주문 상세
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OrderResponse'
              examples:
                shipped-order:
                  $ref: '#/components/examples/NestedOrderDetailResponseExample'
        '404':
          $ref: '#/components/responses/NotFound'

  /api/orders/summaries:
    get:
      tags: [Orders]
      operationId: getOrderSummaries
      summary: 주문 요약 목록 조회
      parameters:
        - $ref: '#/components/parameters/CustomerName'
        - $ref: '#/components/parameters/OrderStatusQuery'
        - $ref: '#/components/parameters/MinTotalAmount'
        - $ref: '#/components/parameters/OrderedFrom'
        - $ref: '#/components/parameters/OrderedTo'
      responses:
        '200':
          description: 주문 요약 목록
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/OrderSummaryResponse'
              examples:
                success:
                  $ref: '#/components/examples/OrderSummaryListResponseExample'

  /api/orders/status/{status}:
    get:
      tags: [Orders]
      operationId: getOrdersByStatus
      summary: 상태별 주문 목록 조회
      parameters:
        - $ref: '#/components/parameters/OrderStatusPath'
      responses:
        '200':
          description: 상태별 주문 목록
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/OrderResponse'
              examples:
                paid-orders:
                  $ref: '#/components/examples/PaidOrderListResponseExample'
        '400':
          $ref: '#/components/responses/BadRequest'

  /api/orders/status/{status}/summaries:
    get:
      tags: [Orders]
      operationId: getOrderSummariesByStatus
      summary: 상태별 주문 요약 조회
      parameters:
        - $ref: '#/components/parameters/OrderStatusPath'
      responses:
        '200':
          description: 상태별 주문 요약
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/OrderSummaryResponse'
              examples:
                paid-summaries:
                  $ref: '#/components/examples/PaidOrderSummaryListResponseExample'
        '400':
          $ref: '#/components/responses/BadRequest'

  /api/orders/status-counts:
    get:
      tags: [Orders]
      operationId: countOrdersByStatus
      summary: 주문 상태별 건수 조회
      responses:
        '200':
          description: 상태별 주문 건수
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/OrderStatusCountResponse'
              examples:
                status-counts:
                  $ref: '#/components/examples/OrderStatusCountsResponseExample'

  /api/orders/{id}/items/batch:
    post:
      tags: [Orders]
      operationId: addOrderItems
      summary: 주문 항목 일괄 추가
      parameters:
        - $ref: '#/components/parameters/OrderId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AddOrderItemsRequest'
            examples:
              foreach-request:
                $ref: '#/components/examples/AddOrderItemsRequestExample'
      responses:
        '200':
          description: 추가 결과
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AddOrderItemsResponse'
              examples:
                foreach-response:
                  $ref: '#/components/examples/AddOrderItemsResponseExample'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'

  /api/orders/{id}/items/batch-session:
    post:
      tags: [Orders]
      operationId: addOrderItemsWithBatchSession
      summary: jOOQ batch API 기반 주문 항목 일괄 추가
      parameters:
        - $ref: '#/components/parameters/OrderId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AddOrderItemsRequest'
            examples:
              batch-session-request:
                $ref: '#/components/examples/AddOrderItemsBatchSessionRequestExample'
      responses:
        '200':
          description: 추가 결과
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AddOrderItemsResponse'
              examples:
                batch-session-response:
                  $ref: '#/components/examples/AddOrderItemsBatchSessionResponseExample'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'

  /api/orders/{id}/pay:
    post:
      tags: [Orders]
      operationId: payOrder
      summary: 주문 결제 상태 전이
      parameters:
        - $ref: '#/components/parameters/OrderId'
      responses:
        '200':
          description: 상태 전이 결과
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OrderStatusChangeResponse'
              examples:
                paid:
                  $ref: '#/components/examples/PayOrderResponseExample'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'

  /api/orders/{id}/cancel:
    post:
      tags: [Orders]
      operationId: cancelOrder
      summary: 주문 취소 상태 전이
      parameters:
        - $ref: '#/components/parameters/OrderId'
      responses:
        '200':
          description: 상태 전이 결과
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OrderStatusChangeResponse'
              examples:
                cancel-created:
                  $ref: '#/components/examples/CancelCreatedOrderResponseExample'
                cancel-paid:
                  $ref: '#/components/examples/CancelPaidOrderResponseExample'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'

  /api/orders/{id}/ship:
    post:
      tags: [Orders]
      operationId: shipOrder
      summary: 주문 배송 상태 전이
      parameters:
        - $ref: '#/components/parameters/OrderId'
      responses:
        '200':
          description: 상태 전이 결과
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OrderStatusChangeResponse'
              examples:
                shipped:
                  $ref: '#/components/examples/ShipOrderResponseExample'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'

components:
  parameters:
    UserId:
      in: path
      name: id
      required: true
      schema:
        type: integer
        format: int64
        example: 1
    OrderId:
      in: path
      name: id
      required: true
      schema:
        type: integer
        format: int64
        example: 1
    OrderStatusPath:
      in: path
      name: status
      required: true
      schema:
        $ref: '#/components/schemas/OrderStatus'
      example: PAID
    CustomerName:
      in: query
      name: customerName
      required: false
      description: 고객명 prefix 검색
      schema:
        type: string
        example: 한
    OrderStatusQuery:
      in: query
      name: status
      required: false
      schema:
        $ref: '#/components/schemas/OrderStatus'
      example: PAID
    MinTotalAmount:
      in: query
      name: minTotalAmount
      required: false
      schema:
        type: number
        format: decimal
        example: 80000
    OrderedFrom:
      in: query
      name: orderedFrom
      required: false
      schema:
        type: string
        format: date-time
        example: '2024-07-01T00:00:00'
    OrderedTo:
      in: query
      name: orderedTo
      required: false
      schema:
        type: string
        format: date-time
        example: '2024-07-08T23:59:59'

  responses:
    BadRequest:
      description: 잘못된 요청
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ApiErrorResponse'
          examples:
            invalid-parameter:
              $ref: '#/components/examples/BadRequestInvalidParameterExample'
            invalid-body:
              $ref: '#/components/examples/BadRequestInvalidBodyExample'
    NotFound:
      description: 리소스를 찾을 수 없음
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ApiErrorResponse'
          examples:
            order-not-found:
              $ref: '#/components/examples/OrderNotFoundResponseExample'
            user-not-found:
              $ref: '#/components/examples/UserNotFoundResponseExample'
    Conflict:
      description: 상태 충돌 또는 중복
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ApiErrorResponse'
          examples:
            user-duplicate:
              $ref: '#/components/examples/UserAlreadyExistsResponseExample'
            invalid-order-transition:
              $ref: '#/components/examples/InvalidOrderTransitionResponseExample'
            optimistic-lock-conflict:
              $ref: '#/components/examples/OrderStateConflictResponseExample'

  schemas:
    LoginRequest:
      type: object
      required: [username, password]
      properties:
        username:
          type: string
          example: user123
        password:
          type: string
          example: password123
      example:
        username: user123
        password: password123

    LoginResponse:
      type: object
      properties:
        username:
          type: string
          example: user123
        tokenType:
          type: string
          example: Bearer
        accessToken:
          type: string
          example: eyJhbGciOiJIUzUxMiJ9...
        accessTokenExpiresAt:
          type: integer
          format: int64
          example: 1760000000000
      example:
        username: user123
        tokenType: Bearer
        accessToken: eyJhbGciOiJIUzUxMiJ9...
        accessTokenExpiresAt: 1760000000000

    UserType:
      type: string
      enum: [USER, MANAGER]
      example: USER

    OrderStatus:
      type: string
      enum: [CREATED, PAID, SHIPPED, CANCELLED]
      example: PAID

    CreateUserRequest:
      type: object
      required: [username, password, name, email, userType, trialCount]
      properties:
        username:
          type: string
          example: new-user
        password:
          type: string
          example: secret123
        name:
          type: string
          example: New User
        email:
          type: string
          format: email
          example: new.user@example.com
        userType:
          $ref: '#/components/schemas/UserType'
        trialCount:
          type: integer
          format: int32
          example: 0
      example:
        username: new-user
        password: secret123
        name: New User
        email: new.user@example.com
        userType: USER
        trialCount: 0

    UpdateUserRequest:
      type: object
      required: [id]
      properties:
        id:
          type: integer
          format: int64
          example: 1
        username:
          type: string
          example: user123
        password:
          type: string
          example: secret123
        name:
          type: string
          example: John Doe Updated
        email:
          type: string
          format: email
          example: john.updated@example.com
        lastLoginAt:
          type: string
          format: date-time
          example: '2026-05-08T09:00:00'
        updatedAt:
          type: string
          format: date-time
          example: '2026-05-08T09:05:00'
        deletedAt:
          type: string
          format: date-time
          nullable: true
          example: null
        lastPasswordUpdatedAt:
          type: string
          format: date-time
          example: '2026-05-01T08:00:00'
        userType:
          $ref: '#/components/schemas/UserType'
        trialCount:
          type: integer
          format: int32
          example: 0
      example:
        id: 1
        username: user123
        password: secret123
        name: John Doe Updated
        email: john.updated@example.com
        lastLoginAt: '2026-05-08T09:00:00'
        updatedAt: '2026-05-08T09:05:00'
        deletedAt: null
        lastPasswordUpdatedAt: '2026-05-01T08:00:00'
        userType: USER
        trialCount: 0

    UserRoleResponse:
      type: object
      properties:
        id:
          type: integer
          format: int64
          example: 1
        name:
          type: string
          example: ADMIN
        description:
          type: string
          example: admin
        createdAt:
          type: string
          format: date-time
          example: '2024-05-01T09:00:00'
        updatedAt:
          type: string
          format: date-time
          example: '2024-05-01T09:00:00'
      example:
        id: 1
        name: ADMIN
        description: admin
        createdAt: '2024-05-01T09:00:00'
        updatedAt: '2024-05-01T09:00:00'

    UserResponse:
      type: object
      properties:
        id:
          type: integer
          format: int64
          example: 1
        username:
          type: string
          example: user123
        name:
          type: string
          example: John Doe
        email:
          type: string
          format: email
          example: john.doe@example.com
        userType:
          type: string
          example: USER
        lastLoginAt:
          type: string
          format: date-time
          nullable: true
          example: '2024-06-01T10:30:00'
        createdAt:
          type: string
          format: date-time
          example: '2024-05-01T09:00:00'
        updatedAt:
          type: string
          format: date-time
          nullable: true
          example: '2024-06-01T10:30:00'
        deletedAt:
          type: string
          format: date-time
          nullable: true
          example: null
        lastPasswordUpdatedAt:
          type: string
          format: date-time
          nullable: true
          example: '2024-05-01T09:00:00'
        trialCount:
          type: integer
          format: int32
          example: 1
        roles:
          type: array
          items:
            $ref: '#/components/schemas/UserRoleResponse'
      example:
        id: 1
        username: user123
        name: John Doe
        email: john.doe@example.com
        userType: USER
        lastLoginAt: '2024-06-01T10:30:00'
        createdAt: '2024-05-01T09:00:00'
        updatedAt: '2024-06-01T10:30:00'
        deletedAt: null
        lastPasswordUpdatedAt: '2024-05-01T09:00:00'
        trialCount: 1
        roles:
          - id: 1
            name: ADMIN
            description: admin
            createdAt: '2024-05-01T09:00:00'
            updatedAt: '2024-05-01T09:00:00'

    UpdateUserResponse:
      type: object
      properties:
        id:
          type: integer
          format: int64
          example: 1
        updatedCount:
          type: integer
          format: int32
          example: 1
      example:
        id: 1
        updatedCount: 1

    DeleteUserResponse:
      type: object
      properties:
        id:
          type: integer
          format: int64
          example: 2
        deletedCount:
          type: integer
          format: int32
          example: 1
      example:
        id: 2
        deletedCount: 1

    AddOrderItemsRequest:
      type: object
      required: [items]
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/OrderItemRequest'
      example:
        items:
          - productName: USB Hub
            quantity: 1
            unitPrice: 29000.00
            lineAmount: 29000.00
          - productName: Laptop Stand
            quantity: 1
            unitPrice: 49000.00
            lineAmount: 49000.00

    OrderItemRequest:
      type: object
      required: [productName, quantity, unitPrice, lineAmount]
      properties:
        productName:
          type: string
          example: USB Hub
        quantity:
          type: integer
          format: int32
          example: 1
        unitPrice:
          type: number
          format: decimal
          example: 29000.00
        lineAmount:
          type: number
          format: decimal
          example: 29000.00
      example:
        productName: USB Hub
        quantity: 1
        unitPrice: 29000.00
        lineAmount: 29000.00

    CustomerResponse:
      type: object
      properties:
        id:
          type: integer
          format: int64
          example: 1
        name:
          type: string
          example: 한수진
        email:
          type: string
          format: email
          example: sujin.han@example.com
      example:
        id: 1
        name: 한수진
        email: sujin.han@example.com

    OrderItemResponse:
      type: object
      properties:
        id:
          type: integer
          format: int64
          example: 1
        productName:
          type: string
          example: Mechanical Keyboard
        quantity:
          type: integer
          format: int32
          example: 1
        unitPrice:
          type: number
          format: decimal
          example: 129000.00
        lineAmount:
          type: number
          format: decimal
          example: 129000.00
      example:
        id: 1
